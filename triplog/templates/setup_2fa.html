<!DOCTYPE html>
<html lang="{{ current_lang|lower }}">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'><rect width='128' height='128' rx='28' fill='%230E1B2C'/><circle cx='38' cy='34' r='6' fill='%231DE9B6'/><rect x='32' y='46' width='12' height='56' rx='3' fill='%23E8EEF7'/><rect x='56' y='34' width='44' height='68' rx='10' fill='none' stroke='%23E8EEF7' stroke-width='6'/><rect x='72' y='26' width='12' height='10' rx='2' fill='%23E8EEF7'/><rect x='64' y='58' width='28' height='36' rx='4' fill='%231DE9B6'/><path d='M80 62 l-10 16 h8 l-4 12 14 -18 h-8 z' fill='%230E1B2C'/></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <title>ID·Mate — 2FA einrichten</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh}
    .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:2rem;width:360px}
    h1{font-size:1.2rem;color:#58a6ff;text-align:center;margin-bottom:1rem}
    .qr-wrap{text-align:center;margin:1rem 0}
    .qr-wrap img{border-radius:8px;border:2px solid #30363d;background:#fff;padding:6px}
    .instruction{font-size:0.82rem;color:#8b949e;text-align:center;margin-bottom:1rem;line-height:1.4}
    .secret-row{display:flex;align-items:center;gap:0.4rem;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:0.4rem 0.6rem;margin-bottom:1rem}
    .secret-text{font-family:monospace;font-size:0.85rem;color:#e6edf3;flex:1;user-select:all;word-break:break-all}
    .copy-btn{background:#21262d;border:1px solid #30363d;color:#8b949e;border-radius:4px;padding:0.25rem 0.5rem;cursor:pointer;font-size:0.75rem;white-space:nowrap}
    .copy-btn:hover{color:#e6edf3;border-color:#8b949e}
    label{display:block;font-size:0.8rem;color:#8b949e;margin-bottom:0.3rem}
    input{width:100%;padding:0.5rem 0.7rem;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:1rem;letter-spacing:0.15em;text-align:center}
    input:focus{border-color:#58a6ff;outline:none}
    .btn-primary{width:100%;padding:0.6rem;border-radius:6px;border:none;background:#238636;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:1rem}
    .btn-primary:hover{background:#2ea043}
    .btn-skip{width:100%;padding:0.5rem;border-radius:6px;border:1px solid #30363d;background:transparent;color:#8b949e;font-size:0.85rem;cursor:pointer;margin-top:0.5rem}
    .btn-skip:hover{color:#e6edf3;border-color:#8b949e}
    .error{background:#da36331a;border:1px solid #da3633;color:#f85149;border-radius:6px;padding:0.5rem;font-size:0.8rem;text-align:center;margin-bottom:0.5rem}
  </style>
</head>
<body>
  <div class="card">
    <h1>Zwei-Faktor-Authentifizierung einrichten</h1>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <div class="instruction">Scanne den QR-Code mit einer Authenticator-App (z.B. Apple Passwörter, Google Authenticator, Authy)</div>
    <div class="qr-wrap">
      <img src="data:image/png;base64,{{ qr_b64 }}" alt="QR-Code" width="180" height="180">
    </div>
    <div class="instruction" style="margin-bottom:0.4rem">Oder gib den Schlüssel manuell ein:</div>
    <div class="secret-row">
      <span class="secret-text" id="secretText">{{ secret }}</span>
      <button type="button" class="copy-btn" onclick="copySecret()">Kopieren</button>
    </div>
    <form method="POST" action="/setup/2fa">
      <input type="hidden" name="secret" value="{{ secret }}">
      <label for="code">Bestätigungscode (6-stellig)</label>
      <input type="text" id="code" name="code" inputmode="numeric" pattern="[0-9]{6}" autocomplete="one-time-code" maxlength="6" autofocus placeholder="000000">
      <button type="submit" class="btn-primary">Aktivieren</button>
    </form>
    <form method="POST" action="/setup/2fa">
      <input type="hidden" name="action" value="skip">
      <button type="submit" class="btn-skip">Überspringen</button>
    </form>
  </div>
<footer style="text-align:center;padding:1.5rem 0 0.8rem;font-size:0.7rem;color:#484f58"><a href="https://github.com/TheInGoF/IDMate-dev" target="_blank" style="color:#484f58;text-decoration:none">&copy; 2025–2026 ID·Mate &middot; AGPL v3 &middot; v{{ version }}</a></footer>
<script>
  function copySecret() {
    const txt = document.getElementById('secretText').textContent;
    navigator.clipboard.writeText(txt).then(() => {
      const btn = document.querySelector('.copy-btn');
      btn.textContent = 'Kopiert!';
      setTimeout(() => btn.textContent = 'Kopieren', 1500);
    });
  }
</script>
</body>
</html>
