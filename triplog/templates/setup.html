<!DOCTYPE html>
<html lang="{{ current_lang|lower }}">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 128 128'><rect width='128' height='128' rx='28' fill='%230E1B2C'/><circle cx='38' cy='34' r='6' fill='%231DE9B6'/><rect x='32' y='46' width='12' height='56' rx='3' fill='%23E8EEF7'/><rect x='56' y='34' width='44' height='68' rx='10' fill='none' stroke='%23E8EEF7' stroke-width='6'/><rect x='72' y='26' width='12' height='10' rx='2' fill='%23E8EEF7'/><rect x='64' y='58' width='28' height='36' rx='4' fill='%231DE9B6'/><path d='M80 62 l-10 16 h8 l-4 12 14 -18 h-8 z' fill='%230E1B2C'/></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#0d1117">
  <title>ID·Mate Setup</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh}
    .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:2rem;width:340px}
    h1{font-size:1.4rem;color:#58a6ff;text-align:center;margin-bottom:0.4rem}
    .subtitle{text-align:center;font-size:0.8rem;color:#8b949e;margin-bottom:1.5rem}
    label{display:block;font-size:0.8rem;color:#8b949e;margin-bottom:0.3rem;margin-top:0.8rem}
    input{width:100%;padding:0.5rem 0.7rem;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:0.9rem}
    input:focus{border-color:#58a6ff;outline:none}
    button{width:100%;padding:0.6rem;border-radius:6px;border:none;background:#238636;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:1.2rem}
    button:hover{background:#2ea043}
    .error{background:#da36331a;border:1px solid #da3633;color:#f85149;border-radius:6px;padding:0.5rem;font-size:0.8rem;text-align:center;margin-bottom:0.5rem}
    .strength-bar{height:4px;border-radius:2px;margin-top:4px;transition:width 0.2s,background 0.2s;width:0%}
    .strength-label{font-size:0.72rem;margin-top:2px;min-height:1em}
    .lang-row{display:flex;gap:0.6rem;margin-top:0.5rem}
    .lang-btn{flex:1;padding:0.45rem 0;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#8b949e;font-size:0.85rem;font-weight:600;cursor:pointer;text-align:center;transition:border-color 0.15s,color 0.15s}
    .lang-btn.active{border-color:#58a6ff;color:#58a6ff}
  </style>
</head>
<body>
  <form class="card" method="POST" action="/setup">
    <h1><span style="color:#58a6ff;text-shadow:0 0 8px rgba(88,166,255,0.4)">ID·Mate</span></h1>
    <div class="subtitle">Erster Start — Administrator einrichten</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <label for="username">Benutzername</label>
    <input type="text" id="username" name="username" required autofocus autocomplete="username" spellcheck="false" autocapitalize="none">
    <label for="password">Passwort</label>
    <input type="password" id="password" name="password" required autocomplete="new-password">
    <div class="strength-bar" id="strengthBar"></div>
    <div class="strength-label" id="strengthLabel" style="color:#8b949e"></div>
    <label for="password_confirm">Passwort bestätigen</label>
    <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password">
    <label>Sprache / Language</label>
    <input type="hidden" id="language" name="language" value="DE">
    <div class="lang-row">
      <div class="lang-btn active" data-lang="DE" onclick="setLang('DE')">🇩🇪 Deutsch</div>
      <div class="lang-btn" data-lang="EN" onclick="setLang('EN')">🇬🇧 English</div>
    </div>
    <button type="submit">Einrichten</button>
  </form>
<footer style="text-align:center;padding:1.5rem 0 0.8rem;font-size:0.7rem;color:#484f58"><a href="https://github.com/TheInGoF/IDMate-dev" target="_blank" style="color:#484f58;text-decoration:none">&copy; 2025–2026 ID·Mate &middot; AGPL v3 &middot; v{{ version }}</a></footer>
<script>
  function setLang(lang) {
    document.getElementById('language').value = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
  }
  const pw = document.getElementById('password');
  const bar = document.getElementById('strengthBar');
  const lbl = document.getElementById('strengthLabel');
  pw.addEventListener('input', () => {
    const v = pw.value;
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    if (v.length < 8) {
      bar.style.width = '25%'; bar.style.background = '#da3633'; lbl.style.color = '#da3633'; lbl.textContent = 'Zu kurz';
    } else if (score <= 1) {
      bar.style.width = '25%'; bar.style.background = '#da3633'; lbl.style.color = '#da3633'; lbl.textContent = 'Schwach';
    } else if (score === 2) {
      bar.style.width = '50%'; bar.style.background = '#e3b341'; lbl.style.color = '#e3b341'; lbl.textContent = 'Mittel';
    } else if (score === 3) {
      bar.style.width = '75%'; bar.style.background = '#e3b341'; lbl.style.color = '#e3b341'; lbl.textContent = 'Mittel';
    } else {
      bar.style.width = '100%'; bar.style.background = '#238636'; lbl.style.color = '#3fb950'; lbl.textContent = 'Stark';
    }
    if (!v) { bar.style.width = '0'; lbl.textContent = ''; }
  });
</script>
</body>
</html>
