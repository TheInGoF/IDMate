<!DOCTYPE html>
<html lang="{{ current_lang|lower }}">
<head>
  <meta charset="UTF-8">
  <link rel="icon" type="image/svg+xml" href="/static/logo.svg">
  <link rel="apple-touch-icon" href="/static/apple-touch-icon.png">
  <link rel="manifest" href="/static/manifest.webmanifest">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <title>{{ t.setup_page_title }}</title>
  <style>
    @media (prefers-reduced-motion: reduce){*{animation-duration:0.01ms !important;transition-duration:0.01ms !important;scroll-behavior:auto !important}}
    @view-transition{navigation:auto}
    @supports (padding: env(safe-area-inset-top)){body{padding-left:env(safe-area-inset-left);padding-right:env(safe-area-inset-right)}.hdr{padding-top:max(0.5rem,env(safe-area-inset-top))}.menu{padding-top:max(1rem,env(safe-area-inset-top))}.content{padding-bottom:max(0.8rem,env(safe-area-inset-bottom))}}
    @media (pointer: coarse){.burger,.close-btn,.veh-picker{min-height:44px;min-width:44px;display:inline-flex;align-items:center;justify-content:center}.menu a{padding-top:0.9rem;padding-bottom:0.9rem}.tab{min-height:40px}.modal button:not(.mini-btn),.form-actions button{min-height:44px}}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#0d1117;color:#e6edf3;display:flex;flex-direction:column;justify-content:center;align-items:center;min-height:100vh}
    .card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:2rem;width:340px}
    h1{font-size:1.4rem;color:#58a6ff;text-align:center;margin-bottom:0.4rem}
    .subtitle{text-align:center;font-size:0.8rem;color:#8b949e;margin-bottom:1.5rem}
    label{display:block;font-size:0.8rem;color:#8b949e;margin-bottom:0.3rem;margin-top:0.8rem}
    input{width:100%;padding:0.5rem 0.7rem;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:0.9rem}
    input:focus{border-color:#58a6ff;outline:none}
    button{width:100%;padding:0.6rem;border-radius:6px;border:none;background:#238636;color:#fff;font-size:0.9rem;font-weight:600;cursor:pointer;margin-top:1.2rem}
    button:hover{background:#2ea043}
    .error{background:#da36331a;border:1px solid #da3633;color:#f85149;border-radius:6px;padding:0.5rem;font-size:0.8rem;text-align:center;margin-bottom:0.5rem}
    .strength-bar{height:4px;border-radius:2px;margin-top:4px;transition:width 0.2s,background 0.2s;width:0%}
    .strength-label{font-size:0.72rem;margin-top:2px;min-height:1em}
    .lang-row{display:flex;gap:0.6rem;margin-top:0.5rem}
    .lang-btn{flex:1;padding:0.45rem 0;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#8b949e;font-size:0.85rem;font-weight:600;cursor:pointer;text-align:center;transition:border-color 0.15s,color 0.15s}
    .lang-btn.active{border-color:#58a6ff;color:#58a6ff}
    .lang-code{display:inline-block;min-width:1.6em;padding:0.05rem 0.3rem;margin-right:0.4rem;border:1px solid currentColor;border-radius:3px;font-size:0.7rem;letter-spacing:0.05em;vertical-align:middle}
  </style>
  <script defer src="/static/idmate.js"></script>
</head>
<body>
  <form class="card" method="POST" action="/setup">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    <h1><span style="color:#58a6ff;text-shadow:0 0 8px rgba(88,166,255,0.4)">ID·Mate</span></h1>
    <div class="subtitle" id="i18nSubtitle">{{ t.setup_subtitle }}</div>
    {% if error %}
    <div class="error">{{ error }}</div>
    {% endif %}
    <label for="username" id="i18nUsername">{{ t.setup_username }}</label>
    <input type="text" id="username" name="username" required autofocus autocomplete="username" spellcheck="false" autocapitalize="none">
    <label for="password" id="i18nPassword">{{ t.setup_password }}</label>
    <input type="password" id="password" name="password" required autocomplete="new-password">
    <div class="strength-bar" id="strengthBar"></div>
    <div class="strength-label" id="strengthLabel" style="color:#8b949e"></div>
    <label for="password_confirm" id="i18nPasswordConfirm">{{ t.setup_password_confirm }}</label>
    <input type="password" id="password_confirm" name="password_confirm" required autocomplete="new-password">
    <label id="i18nLanguage">{{ t.setup_language }}</label>
    <input type="hidden" id="language" name="language" value="DE">
    <div class="lang-row">
      <div class="lang-btn active" data-lang="DE" data-onclick="setLang" data-args='["DE"]'><span class="lang-code">DE</span> Deutsch</div>
      <div class="lang-btn" data-lang="EN" data-onclick="setLang" data-args='["EN"]'><span class="lang-code">EN</span> English</div>
    </div>
    <button type="submit" id="i18nSubmit">{{ t.setup_submit }}</button>
  </form>
<footer style="text-align:center;padding:1.5rem 0 0.8rem;font-size:0.7rem;color:#8b949e"><a href="https://github.com/TheInGoF/IDMate-dev" target="_blank" style="color:#8b949e;text-decoration:none">&copy; 2026 ID·Mate &middot; AGPL v3 &middot; v{{ version }}</a></footer>
<script nonce="{{ csp_nonce }}">
  // Client-side i18n for the live DE/EN language toggle. Both languages must be
  // present in the page so the toggle can swap strings without a round-trip.
  const I18N = {
    DE: {
      title: 'ID·Mate Setup',
      subtitle: 'Erster Start — Administrator einrichten',
      username: 'Benutzername',
      password: 'Passwort',
      passwordConfirm: 'Passwort bestätigen',
      language: 'Sprache / Language',
      submit: 'Einrichten',
      pwTooShort: 'Zu kurz', pwWeak: 'Schwach', pwMedium: 'Mittel', pwStrong: 'Stark'
    },
    EN: {
      title: 'ID·Mate Setup',
      subtitle: 'First start — set up administrator',
      username: 'Username',
      password: 'Password',
      passwordConfirm: 'Confirm password',
      language: 'Sprache / Language',
      submit: 'Set up',
      pwTooShort: 'Too short', pwWeak: 'Weak', pwMedium: 'Medium', pwStrong: 'Strong'
    }
  };
  let curLang = document.getElementById('language').value || 'DE';

  function applyLang(lang) {
    const d = I18N[lang] || I18N.DE;
    document.title = d.title;
    document.getElementById('i18nSubtitle').textContent = d.subtitle;
    document.getElementById('i18nUsername').textContent = d.username;
    document.getElementById('i18nPassword').textContent = d.password;
    document.getElementById('i18nPasswordConfirm').textContent = d.passwordConfirm;
    document.getElementById('i18nLanguage').textContent = d.language;
    document.getElementById('i18nSubmit').textContent = d.submit;
    updateStrength(); // re-render the strength label in the new language
  }

  function setLang(lang) {
    curLang = lang;
    document.getElementById('language').value = lang;
    document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
    applyLang(lang);
  }

  const pw = document.getElementById('password');
  const bar = document.getElementById('strengthBar');
  const lbl = document.getElementById('strengthLabel');
  function updateStrength() {
    const v = pw.value;
    const d = I18N[curLang] || I18N.DE;
    if (!v) { bar.style.width = '0'; lbl.textContent = ''; return; }
    let score = 0;
    if (v.length >= 8) score++;
    if (/[A-Z]/.test(v)) score++;
    if (/[0-9]/.test(v)) score++;
    if (/[^A-Za-z0-9]/.test(v)) score++;
    if (v.length < 8) {
      bar.style.width = '25%'; bar.style.background = '#da3633'; lbl.style.color = '#f85149'; lbl.textContent = d.pwTooShort;
    } else if (score <= 1) {
      bar.style.width = '25%'; bar.style.background = '#da3633'; lbl.style.color = '#f85149'; lbl.textContent = d.pwWeak;
    } else if (score === 2) {
      bar.style.width = '50%'; bar.style.background = '#e3b341'; lbl.style.color = '#e3b341'; lbl.textContent = d.pwMedium;
    } else if (score === 3) {
      bar.style.width = '75%'; bar.style.background = '#e3b341'; lbl.style.color = '#e3b341'; lbl.textContent = d.pwMedium;
    } else {
      bar.style.width = '100%'; bar.style.background = '#238636'; lbl.style.color = '#3fb950'; lbl.textContent = d.pwStrong;
    }
  }
  pw.addEventListener('input', updateStrength);

  // Sync initial render to the active language (the hidden input default).
  applyLang(curLang);
</script>
</body>
</html>
