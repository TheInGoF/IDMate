# ============================================================
#  IDmate — Home Assistant Automation: Vehicle Telemetry
# ============================================================
#
#  Writes vehicle data of an external vehicle (e.g. via
#  WeConnect, Skoda Connect, Tesla, Kia UVO, ...) directly into
#  InfluxDB in the same format as the ESP32 (IDTelemetry).
#  This lets the IDmate detector recognize trips automatically.
#
#  INSTALLATION:
#    1. Copy this file to /config/automations/ (or paste
#       its contents into automations.yaml)
#    2. Add secrets to /config/secrets.yaml:
#         influx_url:    "http://192.168.x.x:3001"
#         influx_token:  "your-influxdb-api-token"
#         influx_org:    "home"
#         influx_bucket: "can-scan"
#    3. Adjust the entity IDs below to match your vehicle
#    4. device_name MUST be unique (e.g. "enyaq", "id3")
#       and will appear as a separate vehicle in IDmate
#    5. HA → Developer Tools → reload YAML
#
#  NOTE:
#    Not all fields are available for every integration.
#    Fields that come in as "unknown"/"unavailable" are
#    skipped automatically (Jinja filter).
#
#  The IDmate detector requires at least:
#    - v  (Speed)     → trip start/end detection
#    - s  (SoC)       → energy calculation
#    - la/lo (GPS)    → distance calculation + geocoding
#    - pk (IsParked)  → parked status
#  Optional but recommended:
#    - od (Odometer), r (Range), ca (Capacity),
#      et (ExtTemp), c/dc (Charging)
# ============================================================

automation:
  - id: idmate_vehicle_telemetry
    alias: "IDmate — Vehicle telemetry to InfluxDB"
    description: >-
      Writes vehicle data to InfluxDB every 60 seconds
      in the IDTelemetry line-protocol format.

    mode: single

    # ── Trigger: every minute ─────────────────────────────────────
    trigger:
      - platform: time_pattern
        minutes: "/1"

    # ── Condition: only when the speed entity is available ────
    condition:
      - condition: not
        conditions:
          - condition: state
            entity_id: &speed_entity sensor.fahrzeug_speed
            state: "unavailable"

    # ── Variables ─────────────────────────────────────────────
    variables:
      # ── Vehicle identifier (must match the IDmate devices) ──
      device_name: "mein_fahrzeug"

      # ── Adjust the entity IDs! ──────────────────────────────
      # Speed (km/h) — REQUIRED
      speed: >-
        {{ states('sensor.fahrzeug_speed') | float(0) }}

      # State of Charge (%) — REQUIRED
      soc: >-
        {{ states('sensor.fahrzeug_soc') | float(-1) }}

      # GPS — REQUIRED (or use a device_tracker)
      latitude: >-
        {{ state_attr('device_tracker.fahrzeug', 'latitude') | float(0) }}
      longitude: >-
        {{ state_attr('device_tracker.fahrzeug', 'longitude') | float(0) }}

      # Parked status — REQUIRED
      is_parked: >-
        {% if is_state('binary_sensor.fahrzeug_parked', 'on')
            or states('sensor.fahrzeug_speed') | float(0) == 0 %}1{% else %}0{% endif %}

      # Odometer (km) — recommended
      odometer: >-
        {{ states('sensor.fahrzeug_odometer') | float(-1) }}

      # Range (km) — recommended
      range_km: >-
        {{ states('sensor.fahrzeug_range') | float(-1) }}

      # Battery capacity (kWh) — recommended for SoH
      capacity: >-
        {{ states('sensor.fahrzeug_battery_capacity') | float(-1) }}

      # Outside temperature (°C)
      ext_temp: >-
        {{ states('sensor.fahrzeug_outside_temperature') | float(-999) }}

      # Battery temperature (°C)
      bat_temp: >-
        {{ states('sensor.fahrzeug_battery_temperature') | float(-999) }}

      # Charging active
      is_charging: >-
        {% if is_state('binary_sensor.fahrzeug_charging', 'on') %}1{% else %}0{% endif %}

      # DC fast charging
      is_dcfc: >-
        {% if is_state('binary_sensor.fahrzeug_dc_charging', 'on') %}1{% else %}0{% endif %}

      # Power (kW, positive = consumption)
      power: >-
        {{ states('sensor.fahrzeug_power') | float(-999) }}

      # ── Assemble the line protocol ──────────────────────────
      # Format: v,d={device} field1=value1,field2=value2 {timestamp_ns}
      line_protocol: >-
        v,d={{ device_name }}
        {%- set fields = [] -%}
        {%- if speed | float(0) >= 0 -%}
          {%- set fields = fields + ['v=' ~ speed] -%}
        {%- endif -%}
        {%- if soc | float(-1) >= 0 -%}
          {%- set fields = fields + ['s=' ~ soc] -%}
        {%- endif -%}
        {%- if latitude | float(0) != 0 and longitude | float(0) != 0 -%}
          {%- set fields = fields + ['la=' ~ latitude, 'lo=' ~ longitude] -%}
        {%- endif -%}
        {%- set fields = fields + ['pk=' ~ is_parked ~ 'i'] -%}
        {%- if odometer | float(-1) >= 0 -%}
          {%- set fields = fields + ['od=' ~ odometer] -%}
        {%- endif -%}
        {%- if range_km | float(-1) >= 0 -%}
          {%- set fields = fields + ['r=' ~ range_km] -%}
        {%- endif -%}
        {%- if capacity | float(-1) >= 0 -%}
          {%- set fields = fields + ['ca=' ~ capacity] -%}
        {%- endif -%}
        {%- if ext_temp | float(-999) > -999 -%}
          {%- set fields = fields + ['et=' ~ ext_temp | int ~ 'i'] -%}
        {%- endif -%}
        {%- if bat_temp | float(-999) > -999 -%}
          {%- set fields = fields + ['bt=' ~ bat_temp | int ~ 'i'] -%}
        {%- endif -%}
        {%- set fields = fields + ['c=' ~ is_charging ~ 'i'] -%}
        {%- set fields = fields + ['dc=' ~ is_dcfc ~ 'i'] -%}
        {%- if power | float(-999) > -999 -%}
          {%- set fields = fields + ['p=' ~ power] -%}
        {%- endif -%}
        {{ ' ' ~ fields | join(',') }}

    # ── Action: HTTP POST to InfluxDB ─────────────────────────
    action:
      - condition: template
        value_template: >-
          {{ soc | float(-1) >= 0 }}

      - service: rest_command.idmate_influx_write
        data:
          payload: "{{ line_protocol }}"


