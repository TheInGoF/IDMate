# ── Mosquitto MQTT Broker ─────────────────────────────────────
# TLS-secured broker on port 8883

# Logging
log_dest stdout
log_type error
log_type warning
log_type notice

# Persistence
persistence true
persistence_location /mosquitto/data/

# Authentication
password_file /mosquitto/config/passwd
allow_anonymous false

# ── TLS Listener (8883) ──────────────────────────────────────
listener 8883
protocol mqtt

# Certificate paths (Let's Encrypt or self-signed)
cafile   /mosquitto/certs/chain.pem
certfile /mosquitto/certs/cert.pem
keyfile  /mosquitto/certs/key.pem

tls_version tlsv1.2
